<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGY 老年醫學科院外訓練排班系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
.header{background:#1a1a1a;color:#fff;padding:1.25rem 2rem;display:flex;align-items:center;gap:12px}
.header h1{font-size:16px;font-weight:500;letter-spacing:0.02em}
.header .sub{font-size:12px;color:#888;margin-left:auto}
.container{max-width:860px;margin:0 auto;padding:1.5rem 1rem}
.card{background:#fff;border:0.5px solid #e0ddd6;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.card-title{font-size:13px;font-weight:500;color:#666;margin-bottom:1rem;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:0.05em}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.lbl{font-size:13px;color:#555;min-width:80px}
input[type=date],input[type=text]{font-size:13px;padding:7px 11px;border:0.5px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;outline:none;transition:border-color .15s}
input[type=date]:focus,input[type=text]:focus{border-color:#555}
input[type=date]{width:160px}
.date-preview{font-size:12px;color:#888;margin-top:4px;padding-left:92px}
.doctor-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;padding:10px 12px;background:#fafaf8;border-radius:8px;border:0.5px solid #e8e5de}
.doctor-name-input{width:110px}
.day-group{display:flex;gap:4px;flex-wrap:wrap}
.day-cb{display:flex;align-items:center;gap:3px;font-size:12px;padding:4px 9px;border:0.5px solid #ddd;border-radius:6px;cursor:pointer;user-select:none;background:#fff;color:#666;transition:all .12s}
.day-cb.active{background:#e8f0fe;border-color:#93b4f5;color:#2553c7}
.day-cb input{display:none}
.day-label{font-size:12px;color:#888;flex-shrink:0}
.add-btn{font-size:12px;padding:6px 14px;border:0.5px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;color:#555;display:flex;align-items:center;gap:5px;transition:background .12s}
.add-btn:hover{background:#f0efea}
.remove-btn{font-size:11px;padding:4px 10px;border:0.5px solid #f5c6c6;border-radius:6px;background:#fff;cursor:pointer;color:#c0392b;flex-shrink:0}
.remove-btn:hover{background:#fdf0f0}
.gen-btn{width:100%;padding:12px;font-size:14px;font-weight:500;border:0.5px solid #1a1a1a;border-radius:10px;background:#1a1a1a;cursor:pointer;color:#fff;margin-top:4px;letter-spacing:0.03em}
.gen-btn:hover{background:#333}
.export-btn{width:100%;padding:11px;font-size:13px;font-weight:500;border:0.5px solid #0f6e56;border-radius:10px;background:#0f6e56;cursor:pointer;color:#fff;margin-top:8px;letter-spacing:0.03em;display:flex;align-items:center;justify-content:center;gap:8px}
.export-btn:hover{background:#085041}
.result-card{display:none}
.schedule-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:560px}
th{background:#f5f4f0;font-weight:500;padding:9px 10px;border:0.5px solid #e0ddd6;text-align:center;font-size:12px}
td{padding:9px 10px;border:0.5px solid #e0ddd6;text-align:center;vertical-align:top;line-height:1.7}
td:first-child{font-weight:500;font-size:13px;text-align:left;background:#fafaf8;white-space:nowrap}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:5px;margin:1px}
.b-out{background:#dbeafe;color:#1e40af;border:0.5px solid #bfdbfe}
.b-in{background:#dcfce7;color:#166534;border:0.5px solid #bbf7d0}
.b-duty{background:#fef9c3;color:#854d0e;border:0.5px solid #fde68a}
.b-pm{background:#fce7f3;color:#9d174d;border:0.5px solid #fbcfe8}
.b-pause{background:#f1f0ec;color:#888;border:0.5px solid #d8d5cd;font-style:italic}
.warning{background:#fff7ed;color:#9a3412;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:6px;border:0.5px solid #fed7aa}
.stats{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.stat-c{background:#f5f4f0;border-radius:8px;padding:10px 16px;flex:1;min-width:90px;text-align:center}
.stat-c .n{font-size:22px;font-weight:500}
.stat-c .l{font-size:12px;color:#777;margin-top:2px}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.leg{display:flex;align-items:center;gap:5px;font-size:12px;color:#666}
.note{font-size:11px;color:#aaa;margin-top:10px}
.divider{height:0.5px;background:#e8e5de;margin:14px 0}
.phone-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.phone-input{width:130px}
</style>
</head>
<body>
<div class="header">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
  <h1>PGY 老年醫學科 — 院外訓練排班系統</h1>
  <span class="sub">新光醫院</span>
</div>

<div class="container">
  <div class="card">
    <div class="card-title">訓練週設定</div>
    <div class="row">
      <span class="lbl">訓練週起日</span>
      <input type="date" id="weekStart" />
      <span style="font-size:12px;color:#aaa">（請選擇星期一）</span>
    </div>
    <div class="date-preview" id="datePreview"></div>
    <div class="row" style="margin-top:10px">
      <span class="lbl">成果報告日期</span>
      <input type="date" id="reportDate" />
      <span style="font-size:12px;color:#aaa">時間固定 11:00 上午</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">PGY 醫師名單與夜間值班</div>
    <div id="doctorList"></div>
    <button class="add-btn" onclick="addDoctor()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      新增醫師
    </button>
  </div>

  <button class="gen-btn" onclick="generate()">產生排班表</button>

  <div class="card result-card" id="resultSection" style="margin-top:1rem">
    <div class="card-title">排班結果</div>
    <div class="legend">
      <span class="leg"><span class="badge b-out">院外訓練</span></span>
      <span class="leg"><span class="badge b-in">院內留守</span></span>
      <span class="leg"><span class="badge b-duty">夜間值班</span></span>
      <span class="leg"><span class="badge b-pm">pm off</span></span>
    </div>
    <div id="warnings"></div>
    <div class="schedule-wrap"><table id="scheduleTable"></table></div>
    <div class="divider"></div>
    <div style="font-size:12px;font-weight:500;color:#888;margin-bottom:8px">院外訓練次數統計</div>
    <div class="stats" id="statRow"></div>
    <p class="note">※ 系統依規則自動排班，如有特殊需求請手動調整。</p>
    <button class="export-btn" onclick="exportDocx()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      匯出 Word 檔案（.docx）
    </button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const DAYS=['星期一','星期二','星期三','星期四','星期五'];
const DAYS_SHORT=['一','二','三','四','五'];
const DOC_COLORS=['E97132','0F9ED5','4EA72E','7030A0','C00000','2E75B6','833C00'];
const THEME_COLORS=['accent2','accent4','accent6','accent3','accent1','accent5','dark1'];
let dcnt=0;
let lastSchedule=null;

function addDoctor(name='',phone=''){
  dcnt++;
  const id=dcnt;
  const div=document.createElement('div');
  div.className='doctor-row';
  div.id='dr_'+id;
  div.innerHTML=`
    <input class="doctor-name-input" type="text" placeholder="醫師姓名" value="${name}" id="name_${id}" />
    <input class="phone-input" type="text" placeholder="電話（聯絡方式）" value="${phone}" id="phone_${id}" style="width:150px" />
    <span class="day-label">夜間值班：</span>
    <div class="day-group" id="cbs_${id}">
      <label class="day-cb" id="cb_${id}_sun" onclick="toggleSun(${id})" title="星期日（前一晚）值班 → 星期一下午 pm off"><input type="checkbox" id="chk_${id}_sun" />日</label>
      ${DAYS_SHORT.map((d,i)=>`<label class="day-cb" id="cb_${id}_${i}" onclick="toggleCb(${id},${i})"><input type="checkbox" id="chk_${id}_${i}" />${d}</label>`).join('')}
    </div>
    <button class="remove-btn" onclick="removeDoctor(${id})">移除</button>
  `;
  document.getElementById('doctorList').appendChild(div);
}

function toggleCb(docId,dayIdx){
  const chk=document.getElementById(`chk_${docId}_${dayIdx}`);
  const lbl=document.getElementById(`cb_${docId}_${dayIdx}`);
  chk.checked=!chk.checked;
  lbl.classList.toggle('active',chk.checked);
}

function toggleSun(docId){
  const chk=document.getElementById(`chk_${docId}_sun`);
  const lbl=document.getElementById(`cb_${docId}_sun`);
  chk.checked=!chk.checked;
  lbl.classList.toggle('active',chk.checked);
}

function removeDoctor(id){
  const el=document.getElementById('dr_'+id);
  if(el)el.remove();
}

function getDoctors(){
  const rows=document.querySelectorAll('.doctor-row');
  const result=[];
  rows.forEach(row=>{
    const id=row.id.replace('dr_','');
    const name=document.getElementById('name_'+id).value.trim();
    if(!name)return;
    const phone=document.getElementById('phone_'+id).value.trim();
    const duty=[];
    for(let i=0;i<5;i++){
      const chk=document.getElementById('chk_'+id+'_'+i);
      if(chk&&chk.checked)duty.push(i);
    }
    const sunChk=document.getElementById('chk_'+id+'_sun');
    const sundayDuty=!!(sunChk&&sunChk.checked);
    result.push({name,phone,duty,sundayDuty});
  });
  return result;
}

document.getElementById('weekStart').addEventListener('change',function(){
  const v=this.value;
  if(!v)return;
  const d=new Date(v+'T00:00:00');
  const dates=DAYS.map((day,i)=>{
    const dd=new Date(d);dd.setDate(d.getDate()+i);
    return `${day} ${dd.getMonth()+1}/${dd.getDate()}`;
  });
  document.getElementById('datePreview').textContent='本週日期：'+dates.join('　');
});

function generate(){
  const weekStart=document.getElementById('weekStart').value;
  if(!weekStart){alert('請選擇訓練週起日');return;}
  const docs=getDoctors();
  if(docs.length<1){alert('請至少新增一位醫師');return;}

  const warnings=[];
  const outCount={};
  docs.forEach(d=>{outCount[d.name]=0;});

  const dutyMap={};
  const afterDutyOff={};
  docs.forEach(d=>{
    d.duty.forEach(day=>{
      if(!dutyMap[day])dutyMap[day]=[];
      dutyMap[day].push(d.name);
      const next=day+1;
      if(next<5){
        if(!afterDutyOff[next])afterDutyOff[next]=[];
        afterDutyOff[next].push(d.name);
      }
    });
    // 星期日（前一晚）值班 → 星期一(day 0) 早上留守、下午 pm off
    if(d.sundayDuty){
      if(!afterDutyOff[0])afterDutyOff[0]=[];
      afterDutyOff[0].push(d.name);
    }
  });

  const schedule=[];
  for(let day=0;day<5;day++){
    const dutyToday=dutyMap[day]||[];
    const postDuty=afterDutyOff[day]||[];
    const pmOffNames=[...postDuty];
    const eligible=docs.filter(d=>!postDuty.includes(d.name));
    const dutyTonightElig=eligible.filter(d=>dutyToday.includes(d.name));
    const nonDutyElig=eligible.filter(d=>!dutyToday.includes(d.name));
    nonDutyElig.sort((a,b)=>outCount[a.name]-outCount[b.name]);

    let outDoc=[];
    let inDoc=[...postDuty];
    dutyTonightElig.forEach(d=>inDoc.push(d.name));

    if(nonDutyElig.length>0&&eligible.length>=2){
      const pick=nonDutyElig[0];
      outDoc.push(pick.name);
      outCount[pick.name]++;
      nonDutyElig.slice(1).forEach(d=>inDoc.push(d.name));
    } else if(nonDutyElig.length>0&&eligible.length===1){
      warnings.push(`${DAYS[day]}：院內人力僅剩1人，院外訓練暫停。`);
      nonDutyElig.forEach(d=>inDoc.push(d.name));
    } else if(nonDutyElig.length===0&&dutyTonightElig.length>=2){
      dutyTonightElig.sort((a,b)=>outCount[a.name]-outCount[b.name]);
      outDoc.push(dutyTonightElig[0].name);
      outCount[dutyTonightElig[0].name]++;
      const idx=inDoc.indexOf(dutyTonightElig[0].name);
      if(idx>-1)inDoc.splice(idx,1);
    } else {
      if(dutyTonightElig.length===1)warnings.push(`${DAYS[day]}：院內人力不足，院外訓練暫停。`);
      else if(eligible.length===0)warnings.push(`${DAYS[day]}：所有醫師皆為隔日rest，院外訓練暫停。`);
    }

    const inDocUniq=[...new Set(inDoc)];
    const fullDayIn=inDocUniq.filter(n=>!pmOffNames.includes(n));
    if(fullDayIn.length===0)warnings.push(`${DAYS[day]}：⚠ 院內無全天留守醫師，請手動調整。`);

    schedule.push({day,inDoc:inDocUniq,outDoc,pmOffNames,dutyToday});
  }

  lastSchedule={schedule,docs,outCount,weekStart};

  const d0=new Date(weekStart+'T00:00:00');
  const colH=DAYS.map((d,i)=>{
    const dd=new Date(d0);dd.setDate(d0.getDate()+i);
    return `${d}<br><span style="font-size:11px;font-weight:400;color:#999">${dd.getMonth()+1}/${dd.getDate()}</span>`;
  });

  let thead=`<thead><tr><th style="text-align:left;min-width:80px">項目</th>${colH.map(h=>`<th>${h}</th>`).join('')}</tr></thead>`;

  function dash(){return '<span style="color:#ccc;font-size:12px">—</span>';}
  const rows=[
    {label:'院內留守',fn:(s)=>{
      const cells=[];
      s.inDoc.forEach(name=>{
        let html=`<span class="badge b-in">${name}</span>`;
        if(s.dutyToday.includes(name))html+=`<span class="badge b-duty">值班</span>`;
        if(s.pmOffNames.includes(name))html+=`<span class="badge b-pm">pm off</span>`;
        cells.push(`<div>${html}</div>`);
      });
      return cells.join('')||dash();
    }},
    {label:'院外訓練',fn:(s)=>{
      return s.outDoc.map(n=>`<div><span class="badge b-out">${n}</span></div>`).join('')||`<span class="badge b-pause">暫停</span>`;
    }},
    {label:'夜間值班',fn:(s)=>{
      return s.dutyToday.map(n=>`<div><span class="badge b-duty">${n}</span></div>`).join('')||dash();
    }},
  ];

  let tbody='<tbody>';
  rows.forEach(r=>{
    tbody+=`<tr><td>${r.label}</td>`;
    schedule.forEach(s=>{tbody+=`<td>${r.fn(s)}</td>`;});
    tbody+='</tr>';
  });
  tbody+='</tbody>';
  document.getElementById('scheduleTable').innerHTML=thead+tbody;

  const warnDiv=document.getElementById('warnings');
  warnDiv.innerHTML=warnings.map(w=>`<div class="warning">⚠ ${w}</div>`).join('');

  document.getElementById('statRow').innerHTML=docs.map(d=>`
    <div class="stat-c">
      <div class="n">${outCount[d.name]||0}</div>
      <div class="l">${d.name}</div>
    </div>
  `).join('');

  const rs=document.getElementById('resultSection');
  rs.style.display='block';
  rs.scrollIntoView({behavior:'smooth',block:'start'});
}

function buildTableXml(schedule,docs,weekStart){
  const d0=new Date(weekStart+'T00:00:00');
  const colorMap={};
  docs.forEach((d,i)=>{
    colorMap[d.name]={hex:DOC_COLORS[i%DOC_COLORS.length],theme:THEME_COLORS[i%THEME_COLORS.length]};
  });

  // Cell widths: [label, mon, tue, wed, thu, fri]
  const CW=[1129,1560,1701,1842,1701,2095];

  // ─ Header row ─
  const dayNames=['星期一','星期二','星期三','星期四','星期五'];
  const dayDates=dayNames.map((_,i)=>{
    const dd=new Date(d0);dd.setDate(d0.getDate()+i);
    return `${dd.getMonth()+1}/${dd.getDate()}`;
  });

  const headerCells=[
    `<w:tc><w:tcPr><w:tcW w:w="${CW[0]}" w:type="dxa"/><w:hideMark/></w:tcPr><w:p><w:pPr><w:rPr><w:rFonts w:ascii="Times" w:eastAsia="標楷體" w:hAnsi="Times"/><w:b/><w:bCs/></w:rPr></w:pPr></w:p></w:tc>`,
  ];
  const dayWidths=[CW[1],CW[2],CW[3],CW[4],CW[5]];
  dayNames.forEach((dn,i)=>{
    const dateStr=dayDates[i];
    const [mo,da]=dateStr.split('/');
    headerCells.push(`<w:tc><w:tcPr><w:tcW w:w="${dayWidths[i]}" w:type="dxa"/></w:tcPr><w:p><w:pPr><w:rPr><w:rFonts w:ascii="Times" w:eastAsia="標楷體" w:hAnsi="Times"/><w:b/><w:bCs/></w:rPr></w:pPr><w:r><w:rPr><w:rFonts w:ascii="Times" w:eastAsia="標楷體" w:hAnsi="Times" w:hint="eastAsia"/><w:b/><w:bCs/></w:rPr><w:t xml:space="preserve">${xmlEsc(dn)} </w:t></w:r><w:r><w:rPr><w:rFonts w:ascii="Times" w:eastAsia="標楷體" w:hAnsi="Times"/><w:b/><w:bCs/></w:rPr><w:t>${mo}/${da}</w:t></w:r></w:p></w:tc>`);
  });

  const row0=`<w:tr><w:trPr><w:trHeight w:val="265"/></w:trPr>${headerCells.join('')}</w:tr>`;

  // ─ 院內留守 row ─
  const inLabelCell=`<w:tc><w:tcPr><w:tcW w:w="${CW[0]}" w:type="dxa"/></w:tcPr><w:p><w:pPr><w:rPr><w:rFonts w:ascii="Times" w:eastAsia="標楷體" w:hAnsi="Times"/><w:b/><w:bCs/><w:sz w:val="22"/><w:szCs w:val="21"/></w:rPr></w:pPr><w:r><w:rPr><w:rFonts w:ascii="Times" w:eastAsia="標楷體" w:hAnsi="Times" w:hint="eastAsia"/><w:b/><w:bCs/><w:sz w:val="22"/><w:szCs w:val="21"/></w:rPr><w:t>院內留守</w:t></w:r></w:p></w:tc>`;
  
  const inDayCells=schedule.map((s,i)=>{
    let paras='';
    s.inDoc.forEach(name=>{
      const c=colorMap[name]||{hex:'000000',theme:'text1'};
      let runs=`<w:r><w:rPr><w:rFonts w:eastAsia="標楷體" w:hint="eastAsia"/><w:color w:val="${c.hex}" w:themeColor="${c.theme}"/></w:rPr><w:t>${xmlEsc(name)}</w:t></w:r>`;
      if(s.pmOffNames.includes(name)) runs+=`<w:r><w:rPr><w:rFonts w:eastAsia="標楷體" w:hint="eastAsia"/><w:sz w:val="22"/><w:szCs w:val="21"/></w:rPr><w:t>(pm off)</w:t></w:r>`;
      paras+=`<w:p><w:pPr><w:rPr><w:rFonts w:eastAsia="標楷體"/></w:rPr></w:pPr>${runs}</w:p>`;
    });
    if(!paras) paras=`<w:p><w:pPr><w:rPr><w:rFonts w:eastAsia="標楷體"/></w:rPr></w:pPr></w:p>`;
    return `<w:tc><w:tcPr><w:tcW w:w="${dayWidths[i]}" w:type="dxa"/></w:tcPr>${paras}</w:tc>`;
  });

  const row1=`<w:tr><w:trPr><w:trHeight w:val="567"/></w:trPr>${inLabelCell}${inDayCells.join('')}</w:tr>`;

  // ─ 院外訓練 row ─
  const outLabelCell=`<w:tc><w:tcPr><w:tcW w:w="${CW[0]}" w:type="dxa"/></w:tcPr><w:p><w:pPr><w:rPr><w:rFonts w:ascii="Times" w:eastAsia="標楷體" w:hAnsi="Times"/><w:b/><w:bCs/><w:sz w:val="22"/><w:szCs w:val="21"/></w:rPr></w:pPr><w:r><w:rPr><w:rFonts w:ascii="Times" w:eastAsia="標楷體" w:hAnsi="Times" w:hint="eastAsia"/><w:b/><w:bCs/><w:sz w:val="22"/><w:szCs w:val="21"/></w:rPr><w:t>院外訓練</w:t></w:r></w:p></w:tc>`;

  const outDayCells=schedule.map((s,i)=>{
    let paras='';
    if(s.outDoc.length===0){
      paras=`<w:p><w:pPr><w:rPr><w:rFonts w:eastAsia="標楷體"/></w:rPr></w:pPr><w:r><w:rPr><w:rFonts w:eastAsia="標楷體" w:hint="eastAsia"/><w:color w:val="808080"/></w:rPr><w:t>（暫停）</w:t></w:r></w:p>`;
    } else {
      s.outDoc.forEach(name=>{
        const c=colorMap[name]||{hex:'000000',theme:'text1'};
        paras+=`<w:p><w:pPr><w:rPr><w:rFonts w:eastAsia="標楷體"/></w:rPr></w:pPr><w:r><w:rPr><w:rFonts w:eastAsia="標楷體" w:hint="eastAsia"/><w:color w:val="${c.hex}" w:themeColor="${c.theme}"/></w:rPr><w:t>${xmlEsc(name)}</w:t></w:r></w:p>`;
      });
    }
    return `<w:tc><w:tcPr><w:tcW w:w="${dayWidths[i]}" w:type="dxa"/></w:tcPr>${paras}</w:tc>`;
  });

  const row2=`<w:tr><w:trPr><w:trHeight w:val="531"/></w:trPr>${outLabelCell}${outDayCells.join('')}</w:tr>`;

  // ─ Contact row: keep from original (it's row3 - includes images and text) ─
  // We rebuild just the text paragraphs, keeping the image as-is from original
  // Build contact paragraphs
  let contactParas=`<w:p><w:pPr><w:snapToGrid w:val="0"/><w:rPr><w:rFonts w:eastAsia="標楷體"/></w:rPr></w:pPr><w:r><w:rPr><w:rFonts w:eastAsia="標楷體" w:hint="eastAsia"/></w:rPr><w:t>聯絡方式：</w:t></w:r></w:p>`;
  docs.forEach(d=>{
    const phone=d.phone||'';
    contactParas+=`<w:p><w:pPr><w:snapToGrid w:val="0"/><w:rPr><w:rFonts w:eastAsia="標楷體"/></w:rPr></w:pPr><w:r><w:rPr><w:rFonts w:eastAsia="標楷體" w:hint="eastAsia"/></w:rPr><w:t xml:space="preserve">${xmlEsc(d.name)} </w:t></w:r><w:r><w:rPr><w:rFonts w:eastAsia="標楷體"/></w:rPr><w:t>${xmlEsc(phone)}</w:t></w:r></w:p>`;
  });

  // Original row3 contact cell content - rebuild with dynamic contact + original image XML
  // We keep the original image runs by embedding them verbatim
  const originalRow3ContactImage = ORIG_ROW3_IMAGE_RUNS;
  
  const row3Cell=`<w:tc><w:tcPr><w:tcW w:w="10028" w:type="dxa"/><w:gridSpan w:val="6"/></w:tcPr>${originalRow3ContactImage}${contactParas}<w:p><w:pPr><w:rPr><w:rFonts w:eastAsia="標楷體"/></w:rPr></w:pPr></w:p></w:tc>`;
  const row3=`<w:tr><w:trPr><w:trHeight w:val="5364"/></w:trPr>${row3Cell}</w:tr>`;

  const tblPrGrid=`<w:tblPr><w:tblStyle w:val="TableGrid"/><w:tblW w:w="10028" w:type="dxa"/><w:tblLook w:val="04A0" w:firstRow="1" w:lastRow="0" w:firstColumn="1" w:lastColumn="0" w:noHBand="0" w:noVBand="1"/></w:tblPr><w:tblGrid><w:gridCol w:w="1129"/><w:gridCol w:w="1560"/><w:gridCol w:w="1701"/><w:gridCol w:w="1842"/><w:gridCol w:w="1701"/><w:gridCol w:w="2095"/></w:tblGrid>`;

  return `<w:tbl>${tblPrGrid}${row0}${row1}${row2}${row3}</w:tbl>`;
}

async function exportDocx(){
  if(!lastSchedule){alert('請先產生排班表');return;}
  const {schedule,docs,weekStart}=lastSchedule;
  
  const reportDateVal=document.getElementById('reportDate').value;
  let reportDateStr='（請填寫）';
  if(reportDateVal){
    const rd=new Date(reportDateVal+'T00:00:00');
    reportDateStr=`${rd.getMonth()+1}/${rd.getDate()}`;
  }

  const d0=new Date(weekStart+'T00:00:00');
  const month=d0.getMonth()+1;

  const tableXml=buildTableXml(schedule,docs,weekStart);

  let docXml=DOC_BEFORE.replace('{{MONTH}}',month);
  docXml+=tableXml;
  docXml+=DOC_AFTER.replace('{{RPT_DATE}}',reportDateStr+' ');

  const zip=new JSZip();
  for(const[path,item] of Object.entries(DOCX_BUNDLE)){
    if(item.t==='b64'){
      zip.file(path, item.d, {base64:true});
    } else {
      zip.file(path, item.d);
    }
  }
  zip.file('word/document.xml', docXml);

  const blob=await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`${month}月_PGY老年醫學科院外訓練_orientation.docx`;
  a.click();
  URL.revokeObjectURL(url);
}
